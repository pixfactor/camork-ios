name: Camork
options:
  bundleIdPrefix: com.camork
  deploymentTarget:
    iOS: "17.0"
  # xcodeVersion 의도적 미설정 — XcodeGen이 현재 설치된 Xcode 기준 동작.
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"          # Xcode build setting = Swift language mode (5.0 / 6.0)
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Camork:
    type: application
    platform: iOS
    sources:
      - path: Camork
        excludes:
          - "**/.DS_Store"
          - "Info.plist"          # XcodeGen이 info.properties로 자동 생성 (중복 방지)
    info:
      path: Camork/Info.plist
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: "현장 기록을 위해 카메라 사용 권한이 필요합니다."
        NSLocationWhenInUseUsageDescription: "촬영 위치를 사진에 함께 기록하기 위해 위치 권한을 요청합니다."
        NSFaceIDUsageDescription: "앱 잠금을 해제하기 위해 Face ID를 사용합니다."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # UIUserInterfaceStyle 의도적 미설정 — 시스템 appearance를 따름. 다크 1차는 Asset Catalog의 다크 우선 컬러로.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.camork.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
        CODE_SIGN_STYLE: Automatic
        # DEVELOPMENT_TEAM 의도적 미설정 — 개인/회사 Mac 차이 흡수.
        # 시뮬레이터 빌드는 CODE_SIGNING_ALLOWED=NO 명령행 옵션으로 회피.
    entitlements:
      path: Camork/Camork.entitlements

  CamorkTests:
    type: bundle.unit-test
    platform: iOS
    sources: CamorkTests
    dependencies:
      - target: Camork
    # BUNDLE_LOADER/TEST_HOST는 XcodeGen이 자동 설정.

name: Camork
options:
  bundleIdPrefix: com.camork
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: true

targets:
  Camork:
    type: application
    platform: iOS
    sources:
      - path: Camork
        excludes:
          - "**/.DS_Store"
    info:
      path: Camork/Info.plist
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: "업무용 사진과 영상을 촬영해 Camork의 분리된 로컬 앨범에 저장하기 위해 카메라 접근이 필요합니다."
        NSFaceIDUsageDescription: "업무용 사진첩을 보호하기 위해 Face ID 또는 기기 인증으로 앱 잠금을 해제합니다."
        NSLocationWhenInUseUsageDescription: "촬영 위치를 기록해 업무 사진을 더 정확하게 관리할 수 있도록 위치 접근을 요청합니다."
        NSMicrophoneUsageDescription: "업무용 동영상을 녹화할 때 소리를 함께 저장하기 위해 마이크 접근이 필요합니다."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.camork.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: RCNZ7N94S3
    entitlements:
      path: Camork/Camork.entitlements
